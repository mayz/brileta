name: Build distributables

# PyInstaller does not cross-compile, so each OS builds on its own runner.
# Every run uploads a per-platform zip as a build artifact (for testing). Runs
# triggered by a version tag (v*) additionally publish a permanent GitHub
# Release with those zips attached - that's the public download surface. Plain
# commits do nothing; push a tag when you want a release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: Brileta-macos
            asset: Brileta.app.zip
          - os: windows-latest
            artifact: Brileta-windows
            asset: Brileta-windows.zip
          - os: ubuntu-latest
            artifact: Brileta-linux
            asset: Brileta-linux.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # wgpu/glfw need native GL/Vulkan/X11 libs present for PyInstaller's
      # analysis to import the backends cleanly on Linux runners.
      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dri libgl1 libglx-mesa0 libegl1 \
            libx11-6 libxext6 libxrandr2 libxi6 libxxf86vm1 \
            libvulkan1 mesa-vulkan-drivers

      - name: Install uv
        # setup-uv publishes no moving v8 major tag, so pin the exact version.
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync

      - name: Build native C extension
        run: uv pip install -e .

      - name: Build with PyInstaller
        run: uv run pyinstaller brileta.spec --noconfirm

      # Zip the build ourselves so the top-level folder/.app is preserved and,
      # on macOS, so the bundle's symlinks and executable bit survive. Uploading
      # the raw folder would strip the Brileta.app wrapper and break the app.
      # ditto packs Brileta.app so it unzips back to a double-clickable Brileta.app.
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/Brileta.app "${{ matrix.asset }}"

      # -y preserves symlinks; the archive keeps the Brileta/ folder at its root.
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -ry "../${{ matrix.asset }}" Brileta

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/Brileta -DestinationPath "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  # On a version tag, gather the three platform zips and publish them as a
  # permanent GitHub Release. Manual runs skip this (they only make artifacts).
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          artifacts/*/*.zip
          --repo "${{ github.repository }}"
          --title "${{ github.ref_name }}"
          --generate-notes
